<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Fine Bio Technology</title>

<meta http-equiv="refresh" content="4;url=https://www.appsheet.com/start/1291b8a6-f089-4a71-8da2-de0eaaf1b51b">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Segoe UI,Arial;
color:white;
overflow:hidden;

background:linear-gradient(-45deg,#141e30,#243b55,#0f2027,#2c5364);
background-size:400% 400%;
animation:bgmove 12s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
font-size:42px;
margin-bottom:50px;
letter-spacing:1px;
animation:fade 1.5s ease;
}

@keyframes fade{
0%{opacity:0;transform:translateY(-30px);}
100%{opacity:1;}
}

/* loader ring */

.loader{
width:110px;
height:110px;
border-radius:50%;
border:6px solid rgba(255,255,255,0.1);
border-top:6px solid #00ffd5;
animation:spin 1s linear infinite;
box-shadow:0 0 40px rgba(0,255,213,0.9);
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* text */

.text{
margin-top:30px;
font-size:18px;
letter-spacing:1px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:0.3;}
50%{opacity:1;}
100%{opacity:0.3;}
}

/* particles */

.particle{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.7;
animation:float linear infinite;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-1000px);
opacity:0;
}
}

</style>
</head>

<body>

<h1>Office Equipment System</h1>

<div class="loader"></div>

<div class="text">กำลังเข้าสู่ระบบ...</div>

<script>

/* create particles */

for(let i=0;i<80;i++){

let p=document.createElement("div")
p.className="particle"

p.style.left=Math.random()*100+"%"
p.style.top=Math.random()*100+"%"
p.style.animationDuration=(5+Math.random()*10)+"s"
p.style.opacity=Math.random()

document.body.appendChild(p)

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Office Equipment System</title>

<script>
setTimeout(function(){
window.location.href="https://www.appsheet.com/start/1291b8a6-f089-4a71-8da2-de0eaaf1b51b";
},3000);
</script>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#2e7d32,#66bb6a);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:white;
text-align:center;
}

.container{
background:white;
color:#333;
padding:50px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:350px;
}

.logo{
font-size:40px;
margin-bottom:10px;
}

h1{
margin-top:10px;
font-size:24px;
}

.loader{
border:6px solid #eee;
border-top:6px solid #2e7d32;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
margin:30px auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.progress{
width:100%;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-top:20px;
}

.progress-bar{
height:10px;
background:#2e7d32;
width:0%;
animation:load 3s linear forwards;
}

@keyframes load{
0%{width:0%;}
100%{width:100%;}
}

.footer{
margin-top:20px;
font-size:13px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">📦</div>

<h1>Office Equipment</h1>
<p>กำลังเข้าสู่ระบบ...</p>

<div class="loader"></div>

<div class="progress">
<div class="progress-bar"></div>
</div>

<div class="footer">
Loading Application...
</div>

</div>

</body>
</html>

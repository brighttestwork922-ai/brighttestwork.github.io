<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Office Equipment System</title>

<script>
setTimeout(function(){
window.location.href="https://www.appsheet.com/start/1291b8a6-f089-4a71-8da2-de0eaaf1b51b";
},3000);
</script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Segoe UI,Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1b5e20,#4caf50,#81c784);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
color:white;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

.container{
text-align:center;
}

.logo{
font-size:60px;
animation:float 2s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

.title{
font-size:28px;
margin-top:15px;
font-weight:600;
letter-spacing:1px;
}

.subtitle{
margin-top:5px;
opacity:0.8;
}

.loader{
margin:35px auto;
border:6px solid rgba(255,255,255,0.3);
border-top:6px solid white;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.progress{
width:260px;
height:8px;
background:rgba(255,255,255,0.2);
border-radius:20px;
overflow:hidden;
margin:auto;
}

.progress-bar{
height:100%;
width:0%;
background:white;
animation:loading 3s linear forwards;
}

@keyframes loading{
0%{width:0%;}
100%{width:100%;}
}

.footer{
margin-top:25px;
font-size:13px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">📦</div>

<div class="title">Office Equipment System</div>
<div class="subtitle">กำลังโหลดระบบ...</div>

<div class="loader"></div>

<div class="progress">
<div class="progress-bar"></div>
</div>

<div class="footer">
Loading application...
</div>

</div>

</body>
</html>

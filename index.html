<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Office Equipment System</title>

<meta http-equiv="refresh" content="3;url=https://www.appsheet.com/start/1291b8a6-f089-4a71-8da2-de0eaaf1b51b">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Segoe UI, Arial;
color:white;
background:linear-gradient(-45deg,#1e3c72,#2a5298,#0f2027,#203a43);
background-size:400% 400%;
animation:bgmove 10s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
font-size:38px;
letter-spacing:1px;
margin-bottom:50px;
animation:fadein 1.5s ease;
}

@keyframes fadein{
0%{opacity:0; transform:translateY(-20px);}
100%{opacity:1; transform:translateY(0);}
}

.loader{
width:90px;
height:90px;
border-radius:50%;
border:6px solid rgba(255,255,255,0.2);
border-top:6px solid #00ffcc;
animation:spin 1s linear infinite;
box-shadow:0 0 25px rgba(0,255,200,0.6);
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.text{
margin-top:25px;
font-size:18px;
opacity:0.9;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:0.3;}
50%{opacity:1;}
100%{opacity:0.3;}
}

</style>
</head>

<body>

<h1>Office Equipment System</h1>

<div class="loader"></div>

<div class="text">กำลังเข้าสู่ระบบ...</div>

</body>
</html>
